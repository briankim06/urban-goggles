global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ingestor"
    static_configs:
      - targets: ["host.docker.internal:9090"]

  - job_name: "processor"
    static_configs:
      - targets: ["host.docker.internal:9091"]

  - job_name: "server"
    static_configs:
      - targets: ["host.docker.internal:9092"]
